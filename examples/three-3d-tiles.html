<!doctype html>
<html lang="en">
  <!-- prettier-ignore -->
  <head>
    <meta charset="utf-8" />
    <title>spark.js - 3D Tiles example using three.js (WebGL)</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { background: #111; color: #fff; font-family: system-ui, sans-serif; }
      canvas { display: block; width: 100%; height: 100%; }
      #credits {
        position: absolute; left: 8px; bottom: 8px;
        font-size: 11px; line-height: 1.3; white-space: pre;
        text-shadow: 0 0 4px #000;
      }
      #error {
        color: #fff; padding: 2em; max-width: 600px; margin: 5em auto;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="credits"></div>
    <script type="module">
      import * as THREE from "three"
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js"
      import { DRACOLoader } from "three/examples/jsm/loaders/DRACOLoader.js"
      import { estimateBytesUsed as estimateGeometryBytes } from "three/examples/jsm/utils/BufferGeometryUtils.js"

      import { TilesRenderer, WGS84_ELLIPSOID, GeoUtils } from "3d-tiles-renderer"
      import { CesiumIonAuthPlugin } from "3d-tiles-renderer/core/plugins"
      import { TilesFadePlugin, TileCompressionPlugin, GLTFExtensionsPlugin, ReorientationPlugin } from "3d-tiles-renderer/plugins"

      import { SparkGL } from "../src/spark-gl.js"
      import { createSparkPlugins } from "@ludicon/spark.js/three-gltf"

      const ionKey = import.meta.env.VITE_ION_KEY
      if (!ionKey) {
        document.body.innerHTML =
          `<div id="error">Set <code>VITE_ION_KEY</code> in a <code>.env</code> file to run this example. ` +
          `Get a free key at <a style="color:#8cf" href="https://ion.cesium.com/">ion.cesium.com</a>.</div>`
        throw new Error("VITE_ION_KEY not set")
      }

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true })
      renderer.setClearColor(0x151c1f)
      renderer.setPixelRatio(window.devicePixelRatio)
      document.body.appendChild(renderer.domElement)

      // Scene / camera / controls
      const scene = new THREE.Scene()
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 40, 1600000)
      camera.position.set(500, 500, 500)

      const controls = new OrbitControls(camera, renderer.domElement)
      controls.minDistance = 100
      controls.maxDistance = 2e4
      controls.enableDamping = true

      // Spark: compressed-texture transcoder sharing the renderer's GL context.
      const gl = renderer.getContext()
      const spark = await SparkGL.create(gl, { preload: ["rgb"], cacheTempResources: true })

      // TilesRenderer pointed at Google Photorealistic 3D Tiles via Cesium Ion.
      const tiles = new TilesRenderer()

      // 3d-tiles-renderer's published getTextureByteLength() doesn't account for ExternalTexture
      // (which is what spark.js produces). Until https://github.com/NASA-AMMOS/3DTilesRendererJS/pull/1560
      // is released, override calculateBytesUsed on the renderer to compute texture bytes ourselves.
      function getTextureBytes(tex) {
        if (tex instanceof THREE.ExternalTexture) return tex.userData?.byteLength ?? 0
        if (!tex.image) return 0
        try {
          let b = THREE.TextureUtils.getByteLength(tex.image.width, tex.image.height, tex.format, tex.type)
          if (tex.generateMipmaps) b *= 4 / 3
          return b
        } catch {
          return 0
        }
      }

      // Copy of estimateSceneBytes in 3DTilesRendererJS/src/three/renderer/utils/MemoryUtils.js:78
      function estimateSceneBytes(object) {
        const dedupeSet = new Set()
        let totalBytes = 0
        object.traverse(c => {
          if (c.geometry && !dedupeSet.has(c.geometry)) {
            totalBytes += estimateGeometryBytes(c.geometry)
            dedupeSet.add(c.geometry)
          }
          if (c.material) {
            for (const k in c.material) {
              const v = c.material[k]
              if (v?.isTexture && !dedupeSet.has(v)) {
                totalBytes += getTextureBytes(v)
                dedupeSet.add(v)
              }
            }
          }
        })
        return totalBytes
      }

      // Override calculateBytesUsed to compute texture bytes ourselves.
      tiles.calculateBytesUsed = function (tile, scene) {
        const bytesUsed = this._bytesUsed
        if (!bytesUsed.has(tile) && scene) bytesUsed.set(tile, estimateSceneBytes(scene))
        return bytesUsed.get(tile) ?? null
      }

      tiles.registerPlugin(new CesiumIonAuthPlugin({ apiToken: ionKey, assetId: "2275207", autoRefreshToken: true }))
      tiles.registerPlugin(new TileCompressionPlugin())
      tiles.registerPlugin(new TilesFadePlugin())
      tiles.registerPlugin(
        new GLTFExtensionsPlugin({
          dracoLoader: new DRACOLoader().setDecoderPath("https://unpkg.com/three@0.153.0/examples/jsm/libs/draco/gltf/"),
          plugins: createSparkPlugins(spark, { preferLowQuality: true, generateMipmaps: false })
        })
      )

      // Default location: Tokyo Tower.
      tiles.registerPlugin(
        new ReorientationPlugin({
          lat: 35.6586 * THREE.MathUtils.DEG2RAD,
          lon: 139.7454 * THREE.MathUtils.DEG2RAD
        })
      )

      tiles.setResolutionFromRenderer(camera, renderer)
      tiles.setCamera(camera)
      scene.add(tiles.group)

      // Resize
      function resize() {
        camera.aspect = window.innerWidth / window.innerHeight
        camera.updateProjectionMatrix()
        renderer.setSize(window.innerWidth, window.innerHeight)
      }
      window.addEventListener("resize", resize)
      resize()

      // Animation loop
      const creditsEl = document.getElementById("credits")
      const invMat = new THREE.Matrix4()
      const camLocal = new THREE.Vector3()
      const cartographic = {}

      function animate() {
        requestAnimationFrame(animate)
        controls.update()

        tiles.errorTarget = 16
        tiles.setResolutionFromRenderer(camera, renderer)
        tiles.setCamera(camera)
        camera.updateMatrixWorld()
        tiles.update()

        renderer.render(scene, camera)

        // Credits + memory readout
        invMat.copy(tiles.group.matrixWorld).invert()
        camLocal.copy(camera.position).applyMatrix4(invMat)
        WGS84_ELLIPSOID.getPositionToCartographic(camLocal, cartographic)

        const attributions = tiles.getAttributions()[0]?.value || ""
        const sceneMB = (estimateSceneBytes(scene) / (1024 * 1024)).toFixed(1)
        const cacheMB = (tiles.lruCache.cachedBytes / (1024 * 1024)).toFixed(1)

        creditsEl.textContent =
          GeoUtils.toLatLonString(cartographic.lat, cartographic.lon) + `\nTexture VRAM: ${sceneMB} MB  |  Tile cache: ${cacheMB} MB\n` + attributions
      }
      animate()
    </script>
  </body>
</html>
